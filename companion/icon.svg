<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="pg" cx="38%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#c0f8e0"/>
      <stop offset="50%"  stop-color="#68c88e"/>
      <stop offset="100%" stop-color="#1a3f28"/>
    </radialGradient>
    <radialGradient id="lg" cx="38%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#f8e8c0"/>
      <stop offset="50%"  stop-color="#c8956a"/>
      <stop offset="100%" stop-color="#3f2010"/>
    </radialGradient>
    <filter id="fp" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="fl" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
  </defs>

  <rect width="512" height="512" fill="#0b0f14"/>

  <!-- glow halos -->
  <circle cx="168" cy="256" r="110" fill="#68c88e" opacity="0.22" filter="url(#fp)"/>
  <circle cx="344" cy="256" r="110" fill="#c8956a" opacity="0.22" filter="url(#fl)"/>

  <!-- pucky -->
  <circle cx="168" cy="256" r="82" fill="url(#pg)"/>

  <!-- loki -->
  <circle cx="344" cy="256" r="82" fill="url(#lg)"/>
</svg>
