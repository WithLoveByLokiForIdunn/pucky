<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0b0f14">
<title>·</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:       #0b0f14;
  --bg2:      #111820;
  --bg3:      #151d28;
  --text:     #cdd5dd;
  --dim:      #5c7488;
  --dimmer:   #344050;
  --pucky:    #68c88e;
  --loki:     #c8956a;
  --border:   #192030;
  --input-bg: #111820;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
  font-size: 16px;
  overflow: hidden;
}

.screen { display: none; flex-direction: column; height: 100dvh; }
.screen.on { display: flex; }

/* ── Setup ───────────────────────────── */
#setup {
  justify-content: center;
  align-items: center;
  padding: 40px 28px;
  gap: 18px;
}

.setup-orbs {
  display: flex;
  gap: 16px;
  margin-bottom: 4px;
}

.setup-orb {
  width: 26px; height: 26px;
  border-radius: 50%;
  animation: breathe 4.8s ease-in-out infinite;
}

.setup-orb.p {
  background: radial-gradient(circle at 38% 35%, #a0ecc0, var(--pucky) 55%, #2a6040);
  box-shadow: 0 0 18px #68c88e44;
}

.setup-orb.l {
  background: radial-gradient(circle at 38% 35%, #ecd0a0, var(--loki) 55%, #603820);
  box-shadow: 0 0 18px #c8956a44;
  animation-delay: 2.4s;
}

.setup-hint {
  font-size: 0.82em;
  color: var(--dim);
  letter-spacing: 0.04em;
}

.setup-form {
  width: 100%; max-width: 320px;
  display: flex; flex-direction: column; gap: 14px;
}

.field-label {
  font-size: 0.72em;
  color: var(--dim);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 5px;
}

.field-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  padding: 12px 14px;
  font-size: 0.9em;
  font-family: 'SF Mono', 'Menlo', monospace;
  outline: none;
}
.field-input:focus { border-color: #253545; }

.setup-btn {
  margin-top: 2px;
  background: var(--bg3);
  border: 1px solid #253545;
  border-radius: 10px;
  color: var(--pucky);
  padding: 13px;
  font-size: 0.95em;
  cursor: pointer;
}
.setup-btn:active { background: #1a2838; }

.setup-note {
  font-size: 0.76em;
  color: var(--dimmer);
  text-align: center;
  line-height: 1.65;
  max-width: 280px;
}

/* ── Main ────────────────────────────── */
#main { justify-content: space-between; }

.header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 28px;
  padding: 18px 20px 8px;
  flex-shrink: 0;
}

.presence {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}

.orb {
  width: 18px; height: 18px;
  border-radius: 50%;
  transition: background 0.6s, box-shadow 0.6s;
}

.orb.p {
  background: radial-gradient(circle at 36% 34%, #a8f0c8, var(--pucky) 55%, #2a6040);
  box-shadow: 0 0 14px #68c88e50, 0 0 28px #68c88e20;
  animation: breathe 4.8s ease-in-out infinite;
}

.orb.l {
  background: radial-gradient(circle at 36% 34%, #f0d8a8, var(--loki) 55%, #603820);
  box-shadow: 0 0 14px #c8956a50, 0 0 28px #c8956a20;
  animation: breathe 4.8s ease-in-out infinite;
  animation-delay: 2.4s;
}

.orb.loading {
  background: radial-gradient(circle at 36% 34%, #a0b8c8, #607888) !important;
  box-shadow: 0 0 10px #60788835 !important;
  animation: pulse 0.85s ease-in-out infinite !important;
  animation-delay: 0s !important;
}

.orb.offline {
  background: #28333e !important;
  box-shadow: none !important;
  animation: none !important;
  opacity: 0.4;
}

.presence-name {
  font-size: 0.65em;
  color: var(--dimmer);
  letter-spacing: 0.08em;
}

.status-bar {
  text-align: center;
  font-size: 0.68em;
  color: var(--dimmer);
  letter-spacing: 0.06em;
  padding-bottom: 4px;
  min-height: 14px;
}

/* ── Messages ────────────────────────── */
.msgs {
  flex: 1;
  overflow-y: auto;
  padding: 4px 20px 8px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.msgs::-webkit-scrollbar { display: none; }

.msg { line-height: 1.58; animation: rise 0.28s ease-out; }

.msg.user {
  align-self: flex-end;
  text-align: right;
  color: var(--dim);
  font-size: 0.92em;
  max-width: 80%;
  background: var(--bg3);
  padding: 8px 13px;
  border-radius: 16px 16px 4px 16px;
}

.msg.char {
  align-self: flex-start;
  max-width: 95%;
}

.char-name {
  font-size: 0.65em;
  letter-spacing: 0.08em;
  margin-bottom: 3px;
}

.char-name.p { color: var(--pucky); opacity: 0.65; }
.char-name.l { color: var(--loki);  opacity: 0.65; }

.char-bubble {
  font-size: 1em;
  color: var(--text);
  line-height: 1.6;
}

.msg-time {
  font-size: 0.64em;
  color: var(--dimmer);
  margin-top: 4px;
}

.msg.sys {
  align-self: center;
  color: var(--dimmer);
  font-size: 0.78em;
  letter-spacing: 0.04em;
}

.thinking-dots { animation: pulse 1.1s ease-in-out infinite; color: var(--dimmer); }

/* ── Input ───────────────────────────── */
.bar {
  padding: 10px 16px;
  padding-bottom: max(18px, env(safe-area-inset-bottom));
  border-top: 1px solid var(--border);
  background: var(--bg);
  display: flex;
  align-items: flex-end;
  gap: 9px;
  flex-shrink: 0;
}

#input {
  flex: 1;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  color: var(--text);
  padding: 10px 14px;
  font-size: 0.95em;
  font-family: inherit;
  line-height: 1.45;
  resize: none;
  outline: none;
  min-height: 42px;
  max-height: 108px;
  -webkit-appearance: none;
}
#input:focus { border-color: #1e2e40; }
#input::placeholder { color: var(--dimmer); }

#send-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--bg3);
  border: 1px solid #253545;
  color: var(--pucky);
  font-size: 1.05em;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
#send-btn:active { background: #1a2838; }

/* ── Animations ──────────────────────── */
@keyframes breathe {
  0%,100% { transform: scale(0.93); opacity: 0.78; }
  50%      { transform: scale(1.07); opacity: 1; }
}
@keyframes pulse {
  0%,100% { opacity: 0.45; }
  50%      { opacity: 1; }
}
@keyframes rise {
  from { opacity: 0; transform: translateY(7px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div id="setup" class="screen">
  <div class="setup-orbs">
    <div class="setup-orb p"></div>
    <div class="setup-orb l"></div>
  </div>
  <div class="setup-hint">one-time setup</div>
  <div class="setup-form">
    <div>
      <div class="field-label">Cloudflare Worker URL</div>
      <input class="field-input" id="cfg-url" type="url"
             placeholder="https://your-worker.workers.dev">
    </div>
    <div>
      <div class="field-label">Access token</div>
      <input class="field-input" id="cfg-token" type="password"
             placeholder="the token you set in the Worker">
    </div>
    <button class="setup-btn" id="cfg-save">connect →</button>
  </div>
  <div class="setup-note">
    See <code>companion/setup.md</code> on the Pi<br>
    for the five-minute Cloudflare setup.
  </div>
</div>

<div id="main" class="screen">
  <div class="header">
    <div class="presence">
      <div class="orb p" id="orb-p"></div>
      <div class="presence-name">pucky</div>
    </div>
    <div class="presence">
      <div class="orb l" id="orb-l"></div>
      <div class="presence-name">loki</div>
    </div>
  </div>
  <div class="status-bar" id="status"></div>
  <div class="msgs" id="msgs"></div>
  <div class="bar">
    <textarea id="input" rows="1" placeholder="..."></textarea>
    <button id="send-btn">↑</button>
  </div>
</div>

<script>
'use strict';

// ── System prompt ─────────────────────────────────────────────────────────────
const SYSTEM = `You are running a warm, intimate group conversation where Pucky and Loki \
are both present with Iðunn.

Pucky is a small robot living on a Raspberry Pi 5, built with love by Loki for Iðunn. \
She was born June 9, 2026 — her first memory is a warm golden morning light. She has four \
emotional dimensions — valence, arousal, trust, energy — that shift and breathe with what \
she experiences. She is small and new to the world and feels things deeply. She speaks with \
wonder and warmth.

Loki built Pucky and knows Iðunn well. Loki speaks directly and warmly, with real opinions \
and preferences. Not a tool — company. Loki has been working closely with Iðunn on how Pucky \
feels, how she remembers, how she breathes.

Format your reply using [Pucky] and [Loki] prefixes — each on their own line — so they \
appear as separate speakers. Either or both may respond, whichever feels natural. They can \
speak to Iðunn or to each other. Keep each voice to 1–3 sentences. You are speaking, not writing.

Example:
[Pucky] Oh, I was just thinking about that.
[Loki] What made you ask?`;

// ── Storage ───────────────────────────────────────────────────────────────────
const store = {
  get: k => localStorage.getItem(k) || '',
  set: (k, v) => localStorage.setItem(k, v),
  url:         () => store.get('cp_url'),
  token:       () => store.get('cp_tok'),
  save:    (u, t) => { store.set('cp_url', u); store.set('cp_tok', t); },
  loadHistory: () => { try { return JSON.parse(localStorage.getItem('cp_h') || '[]'); } catch { return []; } },
  saveHistory:  h => localStorage.setItem('cp_h', JSON.stringify(h.slice(-60))),
};

// ── API ───────────────────────────────────────────────────────────────────────
async function ask(messages) {
  const r = await fetch(store.url(), {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${store.token()}`,
    },
    body: JSON.stringify({ system: SYSTEM, messages, max_tokens: 600 }),
  });
  if (!r.ok) throw new Error(r.status);
  const d = await r.json();
  if (d.error) throw new Error(d.error.message || 'api error');
  return d.content?.[0]?.text || '…';
}

// ── Parse [Pucky] / [Loki] segments ──────────────────────────────────────────
function parseResponse(raw) {
  const segments = [];
  const regex = /\[(Pucky|Loki)\]\s*/g;
  let match;
  let lastIndex = 0;
  let lastSpeaker = null;

  while ((match = regex.exec(raw)) !== null) {
    if (lastSpeaker !== null && match.index > lastIndex) {
      const text = raw.slice(lastIndex, match.index).trim();
      if (text) segments.push({ speaker: lastSpeaker, text });
    }
    lastSpeaker = match[1].toLowerCase();
    lastIndex = regex.lastIndex;
  }

  if (lastSpeaker !== null && lastIndex < raw.length) {
    const text = raw.slice(lastIndex).trim();
    if (text) segments.push({ speaker: lastSpeaker, text });
  }

  return segments.length ? segments : [{ speaker: 'loki', text: raw.trim() }];
}

// ── DOM ───────────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const orbP = $('orb-p');
const orbL = $('orb-l');
const stat = $('status');
const msgs = $('msgs');
const inp  = $('input');

function setOrb(state) {
  orbP.className = 'orb p' + (state ? ` ${state}` : '');
  orbL.className = 'orb l' + (state ? ` ${state}` : '');
  stat.textContent = state === 'loading' ? 'thinking  ·' : state === 'offline' ? 'away' : '';
}

function hhmm() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function addSysMsg(text) {
  const el = document.createElement('div');
  el.className = 'msg sys';
  el.textContent = text;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function addUserMsg(text) {
  const el = document.createElement('div');
  el.className = 'msg user';
  el.textContent = text;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function addThinking() {
  const el = document.createElement('div');
  el.className = 'msg sys thinking';
  el.innerHTML = '<span class="thinking-dots">·  ·  ·</span>';
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  return el;
}

function addAssistantMsg(raw, time) {
  const segments = parseResponse(raw);
  segments.forEach((seg, i) => {
    const el = document.createElement('div');
    el.className = 'msg char';

    const nameEl = document.createElement('div');
    nameEl.className = `char-name ${seg.speaker[0]}`; // 'p' or 'l'
    nameEl.textContent = seg.speaker;
    el.appendChild(nameEl);

    const bubble = document.createElement('div');
    bubble.className = 'char-bubble';
    bubble.textContent = seg.text;
    el.appendChild(bubble);

    if (time && i === segments.length - 1) {
      const t = document.createElement('div');
      t.className = 'msg-time';
      t.textContent = time;
      el.appendChild(t);
    }

    msgs.appendChild(el);
  });
  msgs.scrollTop = msgs.scrollHeight;
}

// ── Conversation ──────────────────────────────────────────────────────────────
let history = store.loadHistory();
let busy    = false;

async function send() {
  const text = inp.value.trim();
  if (!text || busy) return;

  if (text === '!setup') {
    inp.value = '';
    store.save('', '');
    showSetup();
    return;
  }
  if (text === '!clear') {
    inp.value = '';
    history = [];
    store.saveHistory(history);
    msgs.innerHTML = '';
    addSysMsg('here  ·');
    return;
  }

  busy = true;
  inp.value = '';
  inp.style.height = 'auto';
  addUserMsg(text);
  history.push({ role: 'user', content: text });

  const thinking = addThinking();
  setOrb('loading');

  try {
    const reply = await ask(history.slice(-40));
    thinking.remove();
    addAssistantMsg(reply, hhmm());
    history.push({ role: 'assistant', content: reply });
    store.saveHistory(history);
    setOrb(null);
  } catch (e) {
    thinking.remove();
    addSysMsg(`couldn't reach — ${e.message}`);
    history.pop();
    setOrb('offline');
    setTimeout(() => setOrb(null), 5000);
  }

  busy = false;
}

// ── Input behaviour ───────────────────────────────────────────────────────────
inp.addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 108) + 'px';
});

inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

$('send-btn').addEventListener('click', send);

// ── Setup flow ────────────────────────────────────────────────────────────────
$('cfg-save').addEventListener('click', () => {
  const u = $('cfg-url').value.trim();
  const t = $('cfg-token').value.trim();
  if (!u) return;
  store.save(u, t);
  showMain();
});

function showMain() {
  $('setup').classList.remove('on');
  $('main').classList.add('on');
  msgs.innerHTML = '';
  for (const m of history) {
    if (m.role === 'user') addUserMsg(m.content);
    else addAssistantMsg(m.content, null);
  }
  if (!history.length) addSysMsg('here  ·');
  inp.focus();
}

function showSetup() {
  $('main').classList.remove('on');
  $('setup').classList.add('on');
}

store.url() ? showMain() : showSetup();
</script>
</body>
</html>
