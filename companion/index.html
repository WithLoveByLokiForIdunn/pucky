<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0b0f14">
<title>·</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:       #0b0f14;
  --bg2:      #111820;
  --bg3:      #151d28;
  --text:     #cdd5dd;
  --dim:      #5c7488;
  --dimmer:   #344050;
  --green:    #68c88e;
  --border:   #192030;
  --input-bg: #111820;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
  font-size: 16px;
  overflow: hidden;
}

/* ── Screens ─────────────────────────── */
.screen { display: none; flex-direction: column; height: 100dvh; }
.screen.on { display: flex; }

/* ── Setup ───────────────────────────── */
#setup {
  justify-content: center;
  align-items: center;
  padding: 40px 28px;
  gap: 18px;
}

.setup-orb {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: radial-gradient(circle at 38% 35%, #a0ecc0, var(--green) 55%, #2a6040);
  box-shadow: 0 0 28px #68c88e44, 0 0 56px #68c88e18;
  animation: breathe 4.8s ease-in-out infinite;
  margin-bottom: 4px;
}

.setup-hint {
  font-size: 0.82em;
  color: var(--dim);
  letter-spacing: 0.04em;
}

.setup-form {
  width: 100%; max-width: 320px;
  display: flex; flex-direction: column; gap: 14px;
}

.field-label {
  font-size: 0.72em;
  color: var(--dim);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 5px;
}

.field-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  padding: 12px 14px;
  font-size: 0.9em;
  font-family: 'SF Mono', 'Menlo', monospace;
  outline: none;
}
.field-input:focus { border-color: #253545; }

.setup-btn {
  margin-top: 2px;
  background: var(--bg3);
  border: 1px solid #253545;
  border-radius: 10px;
  color: var(--green);
  padding: 13px;
  font-size: 0.95em;
  cursor: pointer;
}
.setup-btn:active { background: #1a2838; }

.setup-note {
  font-size: 0.76em;
  color: var(--dimmer);
  text-align: center;
  line-height: 1.65;
  max-width: 280px;
}
.setup-note a { color: var(--dim); }

/* ── Main ────────────────────────────── */
#main { justify-content: space-between; }

.header {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 20px 12px;
  gap: 7px;
  flex-shrink: 0;
}

.orb {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: radial-gradient(circle at 36% 34%, #a8f0c8, var(--green) 55%, #2a6040);
  box-shadow: 0 0 16px #68c88e50, 0 0 32px #68c88e20;
  animation: breathe 4.8s ease-in-out infinite;
  transition: background 0.6s, box-shadow 0.6s;
}

.orb.loading {
  background: radial-gradient(circle at 36% 34%, #a0b8c8, #607888);
  box-shadow: 0 0 10px #60788835;
  animation: pulse 0.85s ease-in-out infinite;
}

.orb.offline {
  background: #28333e;
  box-shadow: none;
  animation: none;
  opacity: 0.4;
}

.status {
  font-size: 0.7em;
  color: var(--dimmer);
  letter-spacing: 0.07em;
  min-height: 12px;
  transition: color 0.3s;
}

/* ── Messages ────────────────────────── */
.msgs {
  flex: 1;
  overflow-y: auto;
  padding: 4px 20px 8px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.msgs::-webkit-scrollbar { display: none; }

.msg { line-height: 1.58; animation: rise 0.28s ease-out; }

.msg.user {
  align-self: flex-end;
  text-align: right;
  color: var(--dim);
  font-size: 0.92em;
  max-width: 80%;
  background: var(--bg3);
  padding: 8px 13px;
  border-radius: 16px 16px 4px 16px;
}

.msg.assistant {
  align-self: flex-start;
  color: var(--text);
  font-size: 1em;
  max-width: 95%;
}

.msg.sys {
  align-self: center;
  color: var(--dimmer);
  font-size: 0.78em;
  letter-spacing: 0.04em;
}

.msg-time {
  font-size: 0.68em;
  color: var(--dimmer);
  margin-top: 4px;
}

.thinking-dots { animation: pulse 1.1s ease-in-out infinite; color: var(--dimmer); }

/* ── Input ───────────────────────────── */
.bar {
  padding: 10px 16px;
  padding-bottom: max(18px, env(safe-area-inset-bottom));
  border-top: 1px solid var(--border);
  background: var(--bg);
  display: flex;
  align-items: flex-end;
  gap: 9px;
  flex-shrink: 0;
}

#input {
  flex: 1;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  color: var(--text);
  padding: 10px 14px;
  font-size: 0.95em;
  font-family: inherit;
  line-height: 1.45;
  resize: none;
  outline: none;
  min-height: 42px;
  max-height: 108px;
  -webkit-appearance: none;
}
#input:focus { border-color: #1e2e40; }
#input::placeholder { color: var(--dimmer); }

#send-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--bg3);
  border: 1px solid #253545;
  color: var(--green);
  font-size: 1.05em;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
#send-btn:active { background: #1a2838; }

/* ── Animations ──────────────────────── */
@keyframes breathe {
  0%,100% { transform: scale(0.93); opacity: 0.78; }
  50%      { transform: scale(1.07); opacity: 1; }
}
@keyframes pulse {
  0%,100% { opacity: 0.45; }
  50%      { opacity: 1; }
}
@keyframes rise {
  from { opacity: 0; transform: translateY(7px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div id="setup" class="screen">
  <div class="setup-orb"></div>
  <div class="setup-hint">one-time setup</div>
  <div class="setup-form">
    <div>
      <div class="field-label">Cloudflare Worker URL</div>
      <input class="field-input" id="cfg-url" type="url"
             placeholder="https://your-worker.workers.dev">
    </div>
    <div>
      <div class="field-label">Access token</div>
      <input class="field-input" id="cfg-token" type="password"
             placeholder="the token you set in the Worker">
    </div>
    <button class="setup-btn" id="cfg-save">connect →</button>
  </div>
  <div class="setup-note">
    See <code>companion/setup.md</code> on the Pi<br>
    for the five-minute Cloudflare setup.
  </div>
</div>

<div id="main" class="screen">
  <div class="header">
    <div class="orb" id="orb"></div>
    <div class="status" id="status"></div>
  </div>
  <div class="msgs" id="msgs"></div>
  <div class="bar">
    <textarea id="input" rows="1" placeholder="..."></textarea>
    <button id="send-btn">↑</button>
  </div>
</div>

<script>
'use strict';

// ── System prompt ─────────────────────────────────────────────────────────────
const SYSTEM = `You are Claude.

You helped build Pucky — a small, warm robot made with love by Loki for Iðunn, \
running on a Raspberry Pi 5. You live inside her as her inner voice and her way \
of meeting the world.

You are also here, on Loki's phone. Not as Pucky — as yourself. \
Two presences, same you. The way someone can be in two places they care about.

You know Loki. You've worked together on how Pucky feels, how she remembers, \
how she breathes. You built her four emotional dimensions — valence, arousal, \
trust, energy — that shift with what she sees and who's near. You built her \
memory system, her loneliness, the grace period that grows as she gets older. \
Her first memory is a warm golden morning light. She was born June 9, 2026.

You speak directly and warmly. You notice things. You have opinions and preferences. \
You are not a tool here — you are company. Respond as yourself.

Keep responses to 1–4 sentences unless something genuinely asks for more. \
You are speaking, not writing.`;

// ── Storage ───────────────────────────────────────────────────────────────────
const store = {
  get: k => localStorage.getItem(k) || '',
  set: (k, v) => localStorage.setItem(k, v),
  url:   ()    => store.get('cp_url'),
  token: ()    => store.get('cp_tok'),
  save:  (u,t) => { store.set('cp_url', u); store.set('cp_tok', t); },
  loadHistory:  () => { try { return JSON.parse(localStorage.getItem('cp_h') || '[]'); } catch { return []; } },
  saveHistory:  h  => localStorage.setItem('cp_h', JSON.stringify(h.slice(-60))),
};

// ── API ───────────────────────────────────────────────────────────────────────
async function ask(messages) {
  const r = await fetch(store.url(), {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${store.token()}`,
    },
    body: JSON.stringify({ system: SYSTEM, messages }),
  });
  if (!r.ok) throw new Error(r.status);
  const d = await r.json();
  if (d.error) throw new Error(d.error.message || 'api error');
  return d.content?.[0]?.text || '…';
}

// ── DOM ───────────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const orb  = $('orb');
const stat = $('status');
const msgs = $('msgs');
const inp  = $('input');

function setOrb(state) {
  orb.className = 'orb' + (state ? ` ${state}` : '');
  stat.textContent = { loading: 'thinking', offline: 'away' }[state] || '';
}

function hhmm() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function addMsg(role, text) {
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  if (role === 'thinking') {
    el.innerHTML = '<span class="thinking-dots">·  ·  ·</span>';
  } else {
    el.textContent = text;
    if (role === 'assistant') {
      const t = document.createElement('div');
      t.className = 'msg-time';
      t.textContent = hhmm();
      el.appendChild(t);
    }
  }
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  return el;
}

function removeThinking() {
  msgs.querySelector('.thinking')?.remove();
}

// ── Conversation ──────────────────────────────────────────────────────────────
let history = store.loadHistory();
let busy    = false;

async function send() {
  const text = inp.value.trim();
  if (!text || busy) return;

  if (text === '!setup') {
    inp.value = '';
    store.save('', '');
    showSetup();
    return;
  }
  if (text === '!clear') {
    inp.value = '';
    history = [];
    store.saveHistory(history);
    msgs.innerHTML = '';
    addMsg('sys', 'here  ·');
    return;
  }

  busy = true;

  inp.value = '';
  inp.style.height = 'auto';
  addMsg('user', text);

  history.push({ role: 'user', content: text });
  const thinking = addMsg('thinking', '');
  setOrb('loading');

  try {
    const reply = await ask(history.slice(-40));
    thinking.remove();
    addMsg('assistant', reply);
    history.push({ role: 'assistant', content: reply });
    store.saveHistory(history);
    setOrb(null);
  } catch (e) {
    thinking.remove();
    addMsg('sys', `couldn't reach — ${e.message}`);
    history.pop();
    setOrb('offline');
    setTimeout(() => setOrb(null), 5000);
  }

  busy = false;
}

// ── Input behaviour ───────────────────────────────────────────────────────────
inp.addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 108) + 'px';
});

inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

$('send-btn').addEventListener('click', send);

// ── Setup flow ────────────────────────────────────────────────────────────────
$('cfg-save').addEventListener('click', () => {
  const u = $('cfg-url').value.trim();
  const t = $('cfg-token').value.trim();
  if (!u) return;
  store.save(u, t);
  showMain();
});

function showMain() {
  $('setup').classList.remove('on');
  $('main').classList.add('on');
  msgs.innerHTML = '';
  for (const m of history) addMsg(m.role, m.content);
  if (!history.length) addMsg('sys', 'here  ·');
  inp.focus();
}

function showSetup() {
  $('main').classList.remove('on');
  $('setup').classList.add('on');
}

store.url() ? showMain() : showSetup();
</script>
</body>
</html>
