<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0a0e14">
<link rel="manifest" href="game-manifest.json">
<link rel="stylesheet" href="game.css">
<title>the grove</title>
</head>
<body>
<div id="app">

  <!-- Adventure screen -->
  <div id="adv" class="screen on">
    <div class="party-row">
      <div class="party" id="party"></div>
      <div class="inv-btn" onclick="openInventory()">🎒<span class="inv-badge" id="inv-badge"></span></div>
    </div>
    <div class="location-hint" id="location-hint"></div>
    <div class="scene-scroll" id="scene-area"></div>
    <div class="choices" id="choices-area"></div>
  </div>

  <!-- World screen -->
  <div id="world" class="screen">
    <div class="world-subtabs">
      <div class="world-subtab on" data-tab="places" onclick="setWorldSubtab('places')">places</div>
      <div class="world-subtab"    data-tab="beings" onclick="setWorldSubtab('beings')">beings</div>
    </div>
    <div class="world-content" id="world-content"></div>
  </div>

  <!-- Companions screen -->
  <div id="comp" class="screen"></div>

  <!-- Memories screen -->
  <div id="mem" class="screen"></div>

  <!-- Tab bar -->
  <div class="tabs">
    <div class="tab on"  id="tab-adv"   onclick="setTab('adv')">adventure</div>
    <div class="tab"     id="tab-world" onclick="setTab('world')">world</div>
    <div class="tab"     id="tab-comp"  onclick="setTab('comp')">companions</div>
    <div class="tab"     id="tab-mem"   onclick="setTab('mem')">memories</div>
  </div>

</div>

<!-- Inventory overlay -->
<div class="inv-overlay" id="inv-overlay">
  <div class="inv-backdrop" onclick="closeInventory()"></div>
  <div class="inv-panel">
    <div class="inv-panel-head">
      <h2>🎒 inventory <span class="pending-bonus" id="pending-bonus" style="display:none"></span></h2>
      <span class="inv-close" onclick="closeInventory()">✕</span>
    </div>
    <div class="inv-list" id="inv-list"></div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
